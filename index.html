    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What services does 2YouDev provide?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "2YouDev provides custom software development, website development, mobile app development, business systems development, AI integration, and workflow automation."
          }
        },
        {
          "@type": "Question",
          "name": "What types of businesses do you work with?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We work with startups, SMEs, and established companies across industries such as logistics, retail, healthcare, education, financial services, and real estate."
          }
        },
        {
          "@type": "Question",
          "name": "Can you build custom internal systems and automation tools?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. We design and build internal business systems, workflow automation, AI-assisted processes, dashboards, and operational tools tailored to each company's needs."
          }
        },
        {
          "@type": "Question",
          "name": "Can you integrate AI into existing systems?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. We specialize in adding AI capabilities without requiring a full rebuild of your existing systems."
          }
        }
      ]
    }
